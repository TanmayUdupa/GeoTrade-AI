# infrastructure/k8s/deployments.yaml
# GeoTrade AI — Kubernetes Manifests for EKS
# Apply with: kubectl apply -f deployments.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: geotrade
  labels:
    app.kubernetes.io/part-of: geotrade

---
# ─── ConfigMap ────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: geotrade-config
  namespace: geotrade
data:
  KAFKA_BOOTSTRAP_SERVERS: "your-msk-bootstrap.amazonaws.com:9092"
  AWS_REGION: "ap-south-1"
  LOG_LEVEL: "INFO"

---
# ─── Secret (fill with real values or use External Secrets Operator) ──
apiVersion: v1
kind: Secret
metadata:
  name: geotrade-secrets
  namespace: geotrade
type: Opaque
stringData:
  DATABASE_URL: "postgresql://geotrade:PASSWORD@rds-endpoint:5432/geotrade"
  MONGODB_URL: "mongodb://geotrade:PASSWORD@docdb-endpoint:27017"
  REDIS_URL: "rediss://redis-endpoint:6379"
  SNS_TOPIC_ARN: "arn:aws:sns:ap-south-1:ACCOUNT:geotrade-prod-trade-alerts"

---
# ─── Ingestion Service ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: geotrade
  labels:
    app: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
      - name: ingestion
        image: ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/geotrade-ingestion:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: geotrade-config
        - secretRef:
            name: geotrade-secrets
        resources:
          requests: {cpu: "250m", memory: "512Mi"}
          limits:   {cpu: "1000m", memory: "1Gi"}
        readinessProbe:
          httpGet: {path: /health, port: 8001}
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet: {path: /health, port: 8001}
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: geotrade
spec:
  selector:
    app: ingestion-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP

---
# ─── NLP Service ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  namespace: geotrade
  labels:
    app: nlp-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nlp-service
  template:
    metadata:
      labels:
        app: nlp-service
    spec:
      tolerations:
      - key: "ml-only"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: nlp
        image: ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/geotrade-nlp:latest
        ports:
        - containerPort: 8002
        envFrom:
        - configMapRef:
            name: geotrade-config
        - secretRef:
            name: geotrade-secrets
        resources:
          requests: {cpu: "1000m", memory: "2Gi"}
          limits:   {cpu: "4000m", memory: "8Gi"}
        readinessProbe:
          httpGet: {path: /health, port: 8002}
          initialDelaySeconds: 30
          periodSeconds: 15
        livenessProbe:
          httpGet: {path: /health, port: 8002}
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nlp-service
  namespace: geotrade
spec:
  selector:
    app: nlp-service
  ports:
  - port: 8002
    targetPort: 8002

---
# ─── Risk Service ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: geotrade
  labels:
    app: risk-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
    spec:
      containers:
      - name: risk
        image: ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/geotrade-risk:latest
        ports:
        - containerPort: 8003
        envFrom:
        - configMapRef:
            name: geotrade-config
        - secretRef:
            name: geotrade-secrets
        resources:
          requests: {cpu: "500m", memory: "512Mi"}
          limits:   {cpu: "2000m", memory: "2Gi"}
        readinessProbe:
          httpGet: {path: /health, port: 8003}
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: geotrade
spec:
  selector:
    app: risk-service
  ports:
  - port: 8003
    targetPort: 8003

---
# ─── Prediction Service ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service
  namespace: geotrade
  labels:
    app: prediction-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
    spec:
      tolerations:
      - key: "ml-only"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: prediction
        image: ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/geotrade-prediction:latest
        ports:
        - containerPort: 8004
        envFrom:
        - configMapRef:
            name: geotrade-config
        - secretRef:
            name: geotrade-secrets
        env:
        - name: SAGEMAKER_ENDPOINT_NAME
          value: "geotrade-prod-lstm-endpoint"
        resources:
          requests: {cpu: "1000m", memory: "2Gi"}
          limits:   {cpu: "4000m", memory: "8Gi"}
        readinessProbe:
          httpGet: {path: /health, port: 8004}
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: geotrade
spec:
  selector:
    app: prediction-service
  ports:
  - port: 8004
    targetPort: 8004

---
# ─── Alert Service ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: geotrade
  labels:
    app: alert-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      containers:
      - name: alert
        image: ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/geotrade-alert:latest
        ports:
        - containerPort: 8005
        envFrom:
        - configMapRef:
            name: geotrade-config
        - secretRef:
            name: geotrade-secrets
        resources:
          requests: {cpu: "250m", memory: "256Mi"}
          limits:   {cpu: "1000m", memory: "1Gi"}
        readinessProbe:
          httpGet: {path: /health, port: 8005}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: geotrade
spec:
  selector:
    app: alert-service
  ports:
  - port: 8005
    targetPort: 8005

---
# ─── Nginx Ingress ────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geotrade-ingress
  namespace: geotrade
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.geotrade.ai
    secretName: geotrade-tls
  rules:
  - host: api.geotrade.ai
    http:
      paths:
      - path: /ingest
        pathType: Prefix
        backend:
          service: {name: ingestion-service, port: {number: 8001}}
      - path: /analyze
        pathType: Prefix
        backend:
          service: {name: nlp-service, port: {number: 8002}}
      - path: /risk
        pathType: Prefix
        backend:
          service: {name: risk-service, port: {number: 8003}}
      - path: /forecast
        pathType: Prefix
        backend:
          service: {name: prediction-service, port: {number: 8004}}
      - path: /volatility
        pathType: Prefix
        backend:
          service: {name: prediction-service, port: {number: 8004}}
      - path: /alternatives
        pathType: Prefix
        backend:
          service: {name: prediction-service, port: {number: 8004}}
      - path: /alerts
        pathType: Prefix
        backend:
          service: {name: alert-service, port: {number: 8005}}
      - path: /ws
        pathType: Prefix
        backend:
          service: {name: alert-service, port: {number: 8005}}

---
# ─── Horizontal Pod Autoscalers ───────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nlp-hpa
  namespace: geotrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nlp-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-hpa
  namespace: geotrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
