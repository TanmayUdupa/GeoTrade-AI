version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: geotrade
      POSTGRES_USER: geotrade
      POSTGRES_PASSWORD: geotrade_local
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geotrade"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: geotrade
      MONGO_INITDB_ROOT_PASSWORD: geotrade_local
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ─── Backend Microservices ─────────────────────────────────────────
  ingestion-service:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.service
      args: {SERVICE: ingestion}
    ports: ["8001:8001"]
    depends_on: [postgres, mongodb, redis, kafka]
    environment:
      SERVICE_PORT: 8001
      DATABASE_URL: postgresql://geotrade:geotrade_local@postgres:5432/geotrade
      MONGODB_URL: mongodb://geotrade:geotrade_local@mongodb:27017
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file: [.env.local]

  nlp-service:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.service
      args: {SERVICE: nlp}
    ports: ["8002:8002"]
    depends_on: [ingestion-service]
    environment:
      SERVICE_PORT: 8002
      DATABASE_URL: postgresql://geotrade:geotrade_local@postgres:5432/geotrade
      MONGODB_URL: mongodb://geotrade:geotrade_local@mongodb:27017
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file: [.env.local]

  risk-service:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.service
      args: {SERVICE: risk}
    ports: ["8003:8003"]
    depends_on: [nlp-service]
    environment:
      SERVICE_PORT: 8003
      DATABASE_URL: postgresql://geotrade:geotrade_local@postgres:5432/geotrade
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file: [.env.local]

  prediction-service:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.service
      args: {SERVICE: prediction}
    ports: ["8004:8004"]
    depends_on: [risk-service]
    environment:
      SERVICE_PORT: 8004
      DATABASE_URL: postgresql://geotrade:geotrade_local@postgres:5432/geotrade
      REDIS_URL: redis://redis:6379
    env_file: [.env.local]

  alert-service:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.service
      args: {SERVICE: alert}
    ports: ["8005:8005"]
    depends_on: [risk-service]
    environment:
      SERVICE_PORT: 8005
      DATABASE_URL: postgresql://geotrade:geotrade_local@postgres:5432/geotrade
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file: [.env.local]

  # ─── Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    ports: ["3000:3000"]
    environment:
      VITE_API_BASE_URL: http://localhost:8003
      VITE_WS_URL: ws://localhost:8005
    depends_on:
      - risk-service
      - prediction-service
      - alert-service

volumes:
  postgres_data:
  mongo_data:
